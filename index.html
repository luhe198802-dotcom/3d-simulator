<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加工中心 3D 仿真</title>
  <style>
    :root {
      --bg: #101214;
      --panel: #181c20;
      --panel-soft: #20262b;
      --line: #364048;
      --text: #eef3f6;
      --muted: #9aa7b0;
      --green: #23c277;
      --cyan: #3dd6d0;
      --amber: #f0b13b;
      --red: #f05a5a;
      --blue: #5aa9f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #15191d;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .lamp {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 58px);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .controls {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      scrollbar-gutter: stable;
    }

    .section {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child { border-bottom: 0; }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: var(--cyan);
      font-size: 13px;
      font-weight: 700;
      min-height: 20px;
    }

    textarea {
      width: 100%;
      height: 132px;
      min-height: 110px;
      max-height: 170px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1012;
      color: var(--text);
      padding: 10px;
      font: 13px/1.55 Consolas, "Courier New", monospace;
      outline: none;
    }

    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(61, 214, 208, .12);
    }

    .stock-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    .stock-field {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .stock-field input {
      width: 100%;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1012;
      color: var(--text);
      padding: 0 9px;
      font: 700 13px Consolas, "Courier New", monospace;
      outline: none;
    }

    .stock-field input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(61, 214, 208, .12);
    }

    .stock-generate {
      grid-column: 1 / -1;
      padding: 9px;
    }

    .stock-form[data-shape="round"] .box-only { display: none; }
    .stock-form[data-shape="box"] .round-only { display: none; }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 7px;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 8px;
      color: #08100d;
      background: var(--cyan);
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary { background: var(--amber); }
    button.danger { background: var(--red); color: #fff; }
    button.mode-btn {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--line);
    }
    button.mode-btn.active {
      background: var(--cyan);
      color: #06110f;
      border-color: var(--cyan);
    }
    button:active { transform: translateY(1px); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
    }

    .metric {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      min-height: 46px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 5px;
    }

    .metric strong {
      font-size: 15px;
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
    }

    .progress {
      height: 8px;
      background: #0d1012;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid var(--line);
    }

    .progress div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      transition: width .15s linear;
    }

    .log {
      max-height: 180px;
      min-height: 112px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }

    .log-item {
      border-radius: 6px;
      padding: 7px 8px;
      background: #111519;
      border-left: 4px solid var(--green);
      color: var(--muted);
    }

    .hidden-metrics { display: none; }

    .log-item.warn { border-left-color: var(--amber); color: #ffd88c; }
    .log-item.crash { border-left-color: var(--red); color: #ffb5b5; }

    .viewport {
      position: relative;
      min-height: 0;
      background: #0b0d0f;
    }

    #scene {
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene-hud {
      position: absolute;
      left: 12px;
      top: 12px;
      display: grid;
      gap: 7px;
      pointer-events: none;
    }

    .hud-pill {
      width: fit-content;
      max-width: min(420px, calc(100vw - 36px));
      padding: 7px 9px;
      border-radius: 6px;
      background: rgba(17, 21, 25, .88);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted);
      font-size: 12px;
    }

    .top-view {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 240px;
      height: 240px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(13, 16, 18, .92);
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }

    .top-view canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .top-view-label {
      position: absolute;
      left: 8px;
      top: 7px;
      color: var(--cyan);
      font: 700 12px Consolas, "Courier New", monospace;
      pointer-events: none;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .legend b {
      font-weight: 600;
      color: var(--text);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .green { background: var(--green); }
    .amber { background: var(--amber); }
    .red { background: var(--red); }
    .blue { background: var(--blue); }

    .mobile-note { display: none; }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        height: auto;
      }

      .viewport {
        height: 58vh;
        min-height: 360px;
      }

      textarea { height: 120px; min-height: 100px; }
      .mobile-note { display: inline; }
      .top-view {
        width: 165px;
        height: 165px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>加工中心 3D 仿真</h1>
    <div class="status"><span class="lamp" id="lamp"></span><span id="machineStatus">就绪</span></div>
  </header>

  <main>
    <section class="panel controls">
      <div class="section">
        <div class="title-row">
          <span>G 代码编辑器</span>
          <span id="stockLabel">圆料 Ø32mm / 刀具 Ø5mm</span>
        </div>
        <div class="mode-row">
          <button class="mode-btn active" id="roundStock">棒材</button>
          <button class="mode-btn" id="boxStock">长方形</button>
        </div>
        <div class="stock-form" id="stockForm" data-shape="round">
          <label class="stock-field round-only">
            <span>直径 D mm</span>
            <input id="stockDiameter" type="number" min="5" max="300" step="1" value="32">
          </label>
          <label class="stock-field box-only">
            <span>长度 X mm</span>
            <input id="stockWidthInput" type="number" min="5" max="500" step="1" value="200">
          </label>
          <label class="stock-field box-only">
            <span>宽度 Y mm</span>
            <input id="stockDepthInput" type="number" min="5" max="500" step="1" value="200">
          </label>
          <label class="stock-field">
            <span>高度 Z mm</span>
            <input id="stockHeightInput" type="number" min="1" max="100" step="0.5" value="8">
          </label>
          <button class="stock-generate" id="generateStock">生成棒材</button>
        </div>
        <textarea id="gcode" spellcheck="false" placeholder="请输入 G 代码，或点击加载实例..."></textarea>
        <div class="button-row">
          <button id="loadDemo">加载3D实例</button>
          <button class="secondary" id="run">开始仿真</button>
          <button class="danger" id="reset">重置</button>
          <button id="analyze">只检测撞刀</button>
        </div>
      </div>

      <div class="section">
        <div class="title-row">
          <span>实时数据</span>
          <span id="lineInfo">第 0 行</span>
        </div>
        <div class="metrics">
          <div class="metric"><span>当前坐标</span><strong id="pos">X0.000 Y0.000 Z15.000</strong></div>
          <div class="metric"><span>当前指令</span><strong id="cmd">--</strong></div>
          <div class="metric"><span>轨迹长度</span><strong id="length">0.0 mm</strong></div>
          <div class="metric"><span>撞刀状态</span><strong id="crashState">正常</strong></div>
        </div>
        <div class="progress"><div id="progress"></div></div>
      </div>

      <div class="section">
        <div class="title-row">
          <span>报警/检测</span>
          <span>报警数量 <strong id="alarmCount">0</strong></span>
        </div>
        <div class="log" id="log"></div>
      </div>
      <div class="hidden-metrics" aria-hidden="true">
        <span id="boundsLabel">未生成</span>
        <strong id="xRange">--</strong>
        <strong id="yRange">--</strong>
        <strong id="zRange">--</strong>
      </div>
    </section>

    <section class="panel viewport">
      <canvas id="scene"></canvas>
      <div class="scene-hud">
        <div class="hud-pill legend">
          <span><i class="dot green"></i><b>切削 G01/G02/G03</b></span>
          <span><i class="dot amber"></i><b>快速 G00</b></span>
          <span><i class="dot red"></i><b>撞刀点</b></span>
          <span><i class="dot blue"></i><b>刀具路径</b></span>
        </div>
        <div class="hud-pill">视角已锁定，滚轮缩放。<span class="mobile-note">手机可双指缩放。</span></div>
      </div>
      <div class="top-view">
        <canvas id="topView"></canvas>
        <div class="top-view-label">XY 轨迹</div>
      </div>
    </section>
  </main>

  <script type="module">
    import * as THREE from './libs/three.module.js';
    import { OrbitControls } from './libs/OrbitControls.js';

    const TOOL_RADIUS = 2.5;
    const CUT_DEPTH_WARN = 2.0;
    const CUT_DEPTH_CRASH = 4.0;
    const MAX_SPINDLE_SPEED = 800;
    const INITIAL_Z = 15;
    const TOOL_BODY_HEIGHT = 15;
    const STEP_MM = 0.6;
    const SPEED = 0.22;
    const LARGE_STOCK_SPEED_MULTIPLIER = 9;

    const DEFAULT_STOCK = {
      round: { diameter: 32, height: 8 },
      box: { width: 200, depth: 200, height: 8 }
    };

    const crossDemoCode = `O3001 (小材料十字槽实例)
G21 G17 G90
G00 X0 Y0 Z15
M03 S800
G00 X-12 Y0 Z15
G01 Z-2 F100
G01 X12 Y0 F240
G00 Z15
G00 X0 Y-12
G01 Z-2 F100
G01 X0 Y12 F240
G00 Z15
G00 X0 Y0
M05
M30`;

    const elements = {
      canvas: document.getElementById('scene'),
      topView: document.getElementById('topView'),
      gcode: document.getElementById('gcode'),
      loadDemo: document.getElementById('loadDemo'),
      stockLabel: document.getElementById('stockLabel'),
      stockForm: document.getElementById('stockForm'),
      roundStock: document.getElementById('roundStock'),
      boxStock: document.getElementById('boxStock'),
      stockDiameter: document.getElementById('stockDiameter'),
      stockWidthInput: document.getElementById('stockWidthInput'),
      stockDepthInput: document.getElementById('stockDepthInput'),
      stockHeightInput: document.getElementById('stockHeightInput'),
      generateStock: document.getElementById('generateStock'),
      status: document.getElementById('machineStatus'),
      lamp: document.getElementById('lamp'),
      pos: document.getElementById('pos'),
      cmd: document.getElementById('cmd'),
      length: document.getElementById('length'),
      crashState: document.getElementById('crashState'),
      progress: document.getElementById('progress'),
      lineInfo: document.getElementById('lineInfo'),
      xRange: document.getElementById('xRange'),
      yRange: document.getElementById('yRange'),
      zRange: document.getElementById('zRange'),
      boundsLabel: document.getElementById('boundsLabel'),
      alarmCount: document.getElementById('alarmCount'),
      log: document.getElementById('log')
    };

    let renderer, scene, camera, controls;
    let toolGroup, pathGroup, surfaceCutGroup, crashGroup, boundsHelper;
    let bedMesh, stockMesh;
    let activeStockShape = 'round';
    let activeStock = createStockConfig('round', DEFAULT_STOCK.round);
    let commands = [];
    let pathPoints = [];
    let alarms = [];
    let totalLength = 0;
    let animationId = null;
    let running = false;
    let simIndex = 0;
    let segmentT = 0;
    let currentPos = { x: 0, y: 0, z: INITIAL_Z };

    initScene();
    resetSimulation(false);

    document.getElementById('loadDemo').addEventListener('click', () => {
      elements.gcode.value = getDemoCode();
      analyzeProgram();
    });
    elements.roundStock.addEventListener('click', () => setStockShape('round'));
    elements.boxStock.addEventListener('click', () => setStockShape('box'));
    elements.generateStock.addEventListener('click', generateStockFromInputs);
    document.getElementById('run').addEventListener('click', runSimulation);
    document.getElementById('reset').addEventListener('click', () => resetSimulation(true));
    document.getElementById('analyze').addEventListener('click', analyzeProgram);
    window.addEventListener('resize', resizeRenderer);

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0d0f);

      camera = new THREE.PerspectiveCamera(52, 1, 0.1, 1000);
      camera.position.set(0, -52, 30);

      renderer = new THREE.WebGLRenderer({ canvas: elements.canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.06;
      resizeRenderer();

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, -2);
      controls.enableRotate = false;
      controls.enablePan = false;
      controls.enableZoom = true;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.update();

      const ambient = new THREE.HemisphereLight(0xd8f7ff, 0x1e252b, 2.2);
      scene.add(ambient);
      scene.environment = createStudioEnvironment();

      const key = new THREE.DirectionalLight(0xffffff, 2.8);
      key.position.set(30, -36, 42);
      key.castShadow = true;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x8bdcff, 1.15);
      fill.position.set(-34, 24, 28);
      scene.add(fill);

      const rim = new THREE.PointLight(0x68ecff, 18, 120);
      rim.position.set(-20, -30, 28);
      scene.add(rim);

      rebuildStockScene();

      const axes = new THREE.AxesHelper(24);
      scene.add(axes);

      pathGroup = new THREE.Group();
      surfaceCutGroup = new THREE.Group();
      crashGroup = new THREE.Group();
      scene.add(surfaceCutGroup, pathGroup, crashGroup);

      toolGroup = createTool();
      scene.add(toolGroup);

      renderLoop();
    }

    function createTool() {
      const group = new THREE.Group();
      const rotatingParts = new THREE.Group();
      group.userData.rotatingParts = rotatingParts;

      const spindleMaterial = new THREE.MeshStandardMaterial({
        color: 0x58616a,
        roughness: .2,
        metalness: .96,
        envMapIntensity: 1.35
      });
      const holderMaterial = new THREE.MeshStandardMaterial({
        color: 0x323a42,
        roughness: .24,
        metalness: .94,
        envMapIntensity: 1.18
      });
      const colletMaterial = new THREE.MeshStandardMaterial({
        color: 0x78848b,
        roughness: .18,
        metalness: .98,
        envMapIntensity: 1.45
      });
      const cutterMaterial = new THREE.MeshStandardMaterial({
        color: 0xdce4e8,
        roughness: .14,
        metalness: 1,
        envMapIntensity: 1.75
      });
      const fluteMaterial = new THREE.MeshStandardMaterial({
        color: 0x59646c,
        roughness: .22,
        metalness: .98,
        envMapIntensity: 1.22
      });
      const edgeMaterial = new THREE.MeshStandardMaterial({
        color: 0xf8fcff,
        roughness: .08,
        metalness: 1,
        envMapIntensity: 2
      });
      const shadowMaterial = new THREE.MeshBasicMaterial({
        color: 0x050607,
        transparent: true,
        opacity: .24,
        depthWrite: false
      });

      const cuttingLength = TOOL_BODY_HEIGHT * .78;
      const shankLength = TOOL_BODY_HEIGHT - cuttingLength + 1.4;

      const cutterCore = createZCylinder(TOOL_RADIUS * .96, TOOL_RADIUS, cuttingLength, 72, cutterMaterial);
      cutterCore.position.z = cuttingLength / 2 + .16;

      const shank = createZCylinder(TOOL_RADIUS * .88, TOOL_RADIUS * .88, shankLength, 64, cutterMaterial);
      shank.position.z = cuttingLength + shankLength / 2 - .15;

      const endFace = createZCylinder(TOOL_RADIUS * .94, TOOL_RADIUS * .98, .26, 72, edgeMaterial);
      endFace.position.z = .08;

      const lipA = new THREE.Mesh(
        new THREE.BoxGeometry(TOOL_RADIUS * 1.72, .2, .12),
        edgeMaterial
      );
      lipA.position.z = .14;
      lipA.castShadow = true;

      const lipB = lipA.clone();
      lipB.rotation.z = Math.PI / 2;

      const centerRelief = createZCylinder(.32, .32, .14, 24, shadowMaterial);
      centerRelief.position.z = .16;

      const edgeRing = createToolRing(TOOL_RADIUS * .98, .055, .22, edgeMaterial);
      const shoulderRing = createToolRing(TOOL_RADIUS * .9, .06, cuttingLength + .15, edgeMaterial);

      for (let i = 0; i < 4; i++) {
        const angle = i * Math.PI / 2;
        const flute = createHelicalTube(
          TOOL_RADIUS + .03,
          .15,
          cuttingLength - .28,
          angle,
          Math.PI * 2.7,
          6,
          92,
          fluteMaterial
        );
        flute.position.z = .27;

        const cuttingEdge = createHelicalTube(
          TOOL_RADIUS + .13,
          .045,
          cuttingLength - .34,
          angle + .28,
          Math.PI * 2.7,
          5,
          92,
          edgeMaterial
        );
        cuttingEdge.position.z = .3;
        rotatingParts.add(flute, cuttingEdge);
      }

      const colletNose = createZCylinder(TOOL_RADIUS * 1.08, TOOL_RADIUS * 1.58, 3.2, 72, colletMaterial);
      colletNose.position.z = TOOL_BODY_HEIGHT + .05;

      const colletNut = createZCylinder(4.35, 4.05, 4.8, 12, colletMaterial);
      colletNut.position.z = TOOL_BODY_HEIGHT + 3.55;

      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const groove = new THREE.Mesh(
          new THREE.BoxGeometry(.12, .3, 3.95),
          shadowMaterial
        );
        groove.position.set(Math.cos(angle) * 4.38, Math.sin(angle) * 4.38, TOOL_BODY_HEIGHT + 3.55);
        groove.rotation.z = angle;
        rotatingParts.add(groove);
      }

      const holderLowerRing = createToolRing(4.05, .12, TOOL_BODY_HEIGHT + 1.35, edgeMaterial);
      const holderUpperRing = createToolRing(4.28, .13, TOOL_BODY_HEIGHT + 5.85, edgeMaterial);

      const chuckBody = createZCylinder(5.15, 5.15, 3.2, 80, holderMaterial);
      chuckBody.position.z = TOOL_BODY_HEIGHT + 7.55;

      const taper = createZCylinder(6.45, 5.1, 5.1, 80, holderMaterial);
      taper.position.z = TOOL_BODY_HEIGHT + 11.7;

      const spindle = createZCylinder(7.35, 7.35, 4.5, 96, spindleMaterial);
      spindle.position.z = TOOL_BODY_HEIGHT + 16.5;

      const spindleRingTop = createToolRing(7.2, .16, TOOL_BODY_HEIGHT + 18.7, edgeMaterial);
      const spindleRingBottom = createToolRing(6.45, .14, TOOL_BODY_HEIGHT + 14.25, edgeMaterial);

      rotatingParts.add(
        cutterCore,
        shank,
        endFace,
        lipA,
        lipB,
        centerRelief,
        edgeRing,
        shoulderRing,
        colletNose,
        colletNut,
        holderLowerRing,
        holderUpperRing,
        chuckBody,
        taper,
        spindle,
        spindleRingTop,
        spindleRingBottom
      );

      const spindleShadow = createZCylinder(7.5, 6.8, .18, 96, shadowMaterial);
      spindleShadow.position.z = TOOL_BODY_HEIGHT + 14.05;
      rotatingParts.add(spindleShadow);

      group.add(rotatingParts);
      return group;
    }

    function createStudioEnvironment() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#d8f7ff');
      gradient.addColorStop(.32, '#536a75');
      gradient.addColorStop(.58, '#11161b');
      gradient.addColorStop(1, '#020304');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,.72)';
      ctx.fillRect(20, 14, 86, 10);
      ctx.fillRect(142, 25, 72, 8);
      ctx.fillStyle = 'rgba(61,214,208,.22)';
      ctx.fillRect(0, 75, canvas.width, 22);
      const texture = new THREE.CanvasTexture(canvas);
      texture.mapping = THREE.EquirectangularReflectionMapping;
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function createZCylinder(radiusTop, radiusBottom, height, segments, material) {
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radiusTop, radiusBottom, height, segments),
        material
      );
      mesh.rotation.x = Math.PI / 2;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createToolRing(radius, tubeRadius, z, material) {
      const mesh = new THREE.Mesh(
        new THREE.TorusGeometry(radius, tubeRadius, 12, 80),
        material
      );
      mesh.position.z = z;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createHelicalTube(radius, tubeRadius, height, startAngle, twist, radialSegments, tubularSegments, material) {
      const points = [];
      for (let i = 0; i <= tubularSegments; i++) {
        const t = i / tubularSegments;
        const angle = startAngle + twist * t;
        points.push(new THREE.Vector3(
          Math.cos(angle) * radius,
          Math.sin(angle) * radius,
          t * height
        ));
      }
      const curve = new THREE.CatmullRomCurve3(points);
      const mesh = new THREE.Mesh(
        new THREE.TubeGeometry(curve, tubularSegments, tubeRadius, radialSegments, false),
        material
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function resizeRenderer() {
      const rect = elements.canvas.parentElement.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / Math.max(rect.height, 1);
      camera.updateProjectionMatrix();
      drawTopView(pathPoints, currentPos, running ? simIndex : pathPoints.length - 1);
    }

    function renderLoop() {
      controls.update();
      if (toolGroup?.userData.rotatingParts) {
        toolGroup.userData.rotatingParts.rotation.z += running ? .42 : .018;
      }
      renderer.render(scene, camera);
      requestAnimationFrame(renderLoop);
    }

    function getStock() {
      return activeStock;
    }

    function setStockShape(shape) {
      activeStockShape = shape;
      elements.stockForm.dataset.shape = shape;
      elements.roundStock.classList.toggle('active', shape === 'round');
      elements.boxStock.classList.toggle('active', shape === 'box');
      elements.generateStock.textContent = shape === 'round' ? '生成棒材' : '生成长方形';
    }

    function generateStockFromInputs() {
      running = false;
      if (animationId) cancelAnimationFrame(animationId);
      activeStock = createStockConfig(activeStockShape, readStockInputs(activeStockShape));
      rebuildStockScene();
      applyCameraForStock();
      resetSimulation(false);
      if (elements.gcode.value.trim()) analyzeProgram();
    }

    function readStockInputs(shape) {
      const height = clampNumber(elements.stockHeightInput.value, 1, 100, 8);
      if (shape === 'round') {
        return {
          diameter: clampNumber(elements.stockDiameter.value, 5, 300, 32),
          height
        };
      }
      return {
        width: clampNumber(elements.stockWidthInput.value, 5, 500, 200),
        depth: clampNumber(elements.stockDepthInput.value, 5, 500, 200),
        height
      };
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(min, Math.min(max, number));
    }

    function createStockConfig(shape, values) {
      const height = values.height;
      const isRound = shape === 'round';
      const diameter = isRound ? values.diameter : null;
      const width = isRound ? diameter : values.width;
      const depth = isRound ? diameter : values.depth;
      const radius = isRound ? diameter / 2 : Math.hypot(width, depth) / 2;
      const maxSide = Math.max(width, depth);
      const isLarge = maxSide >= 100;
      const tableMargin = Math.max(isLarge ? 30 : 12, maxSide * .18);
      const bedSize = Math.max(44, maxSide + tableMargin);
      const cameraDistance = Math.max(52, maxSide * 1.3);
      const cameraHeight = Math.max(30, maxSide * .75);
      const label = isRound
        ? `棒材 Ø${formatStockNumber(diameter)}×${formatStockNumber(height)}mm / 刀具 Ø5mm`
        : `长方形 ${formatStockNumber(width)}×${formatStockNumber(depth)}×${formatStockNumber(height)}mm / 刀具 Ø5mm`;
      const areaLabel = isRound
        ? `Ø${formatStockNumber(diameter)} 棒材`
        : `${formatStockNumber(width)}×${formatStockNumber(depth)} 长方形`;

      return {
        label,
        areaLabel,
        type: isRound ? 'round' : 'square',
        isLarge,
        radius,
        width,
        depth,
        height,
        bedSize,
        gridSize: bedSize,
        gridDivisions: isLarge ? 22 : 16,
        camera: [0, -cameraDistance, cameraHeight],
        target: [0, 0, -2]
      };
    }

    function formatStockNumber(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function rebuildStockScene() {
      const stock = getStock();
      [bedMesh, stockMesh].forEach(object => {
        if (!object) return;
        scene.remove(object);
        disposeObject(object);
      });

      bedMesh = createMachineTable(stock);
      scene.add(bedMesh);

      const stockGeometry = stock.type === 'round'
        ? new THREE.CylinderGeometry(stock.radius, stock.radius, stock.height, 96)
        : new THREE.BoxGeometry(stock.width, stock.depth, stock.height);

      stockMesh = new THREE.Mesh(
        stockGeometry,
        new THREE.MeshStandardMaterial({ color: 0xaeb8bd, roughness: .46, metalness: .34, envMapIntensity: .82 })
      );
      if (stock.type === 'round') stockMesh.rotation.x = Math.PI / 2;
      stockMesh.position.z = -stock.height / 2;
      stockMesh.castShadow = true;
      stockMesh.receiveShadow = true;
      scene.add(stockMesh);

      elements.stockLabel.textContent = stock.label;
      elements.loadDemo.textContent = shouldUseLargeDemo(stock) ? '加载花形实例' : '加载十字实例';
    }

    function createMachineTable(stock) {
      const group = new THREE.Group();
      const tableSize = stock.bedSize + (stock.isLarge ? 36 : 14);
      const tableTopZ = -stock.height - 0.18;
      const tableThickness = stock.isLarge ? 5.2 : 3.4;
      const topMaterial = new THREE.MeshStandardMaterial({
        color: 0x303b43,
        roughness: .52,
        metalness: .58,
        envMapIntensity: .9
      });
      const sideMaterial = new THREE.MeshStandardMaterial({
        color: 0x151a1f,
        roughness: .7,
        metalness: .42,
        envMapIntensity: .55
      });
      const lipMaterial = new THREE.MeshStandardMaterial({
        color: 0x6d7b83,
        roughness: .35,
        metalness: .82,
        envMapIntensity: 1.12
      });
      const grooveMaterial = new THREE.MeshStandardMaterial({
        color: 0x07090b,
        roughness: .78,
        metalness: .3,
        envMapIntensity: .28
      });
      const clampMaterial = new THREE.MeshStandardMaterial({
        color: 0x222930,
        roughness: .44,
        metalness: .78,
        envMapIntensity: .85
      });

      const tableTop = new THREE.Mesh(
        new THREE.BoxGeometry(tableSize, tableSize, tableThickness),
        topMaterial
      );
      tableTop.position.z = tableTopZ - tableThickness / 2;
      tableTop.castShadow = true;
      tableTop.receiveShadow = true;
      group.add(tableTop);

      const lowerBase = new THREE.Mesh(
        new THREE.BoxGeometry(tableSize * 1.06, tableSize * .98, tableThickness * .58),
        sideMaterial
      );
      lowerBase.position.z = tableTopZ - tableThickness - tableThickness * .29;
      lowerBase.castShadow = true;
      lowerBase.receiveShadow = true;
      group.add(lowerBase);

      const edgeHeight = tableThickness * .92;
      [
        { x: 0, y: tableSize * .51, w: tableSize * 1.04, d: tableSize * .035 },
        { x: 0, y: -tableSize * .51, w: tableSize * 1.04, d: tableSize * .035 },
        { x: tableSize * .51, y: 0, w: tableSize * .035, d: tableSize * 1.04 },
        { x: -tableSize * .51, y: 0, w: tableSize * .035, d: tableSize * 1.04 }
      ].forEach(edge => {
        const rail = new THREE.Mesh(
          new THREE.BoxGeometry(edge.w, edge.d, edgeHeight),
          sideMaterial
        );
        rail.position.set(edge.x, edge.y, tableTopZ - edgeHeight / 2 - .12);
        rail.castShadow = true;
        rail.receiveShadow = true;
        group.add(rail);
      });

      const slotCount = stock.isLarge ? 7 : 5;
      const slotGap = tableSize / (slotCount + 1);
      const slotWidth = stock.isLarge ? 6.4 : 1.65;
      const slotDepth = .12;
      const lipWidth = slotWidth * .24;
      for (let i = 1; i <= slotCount; i++) {
        const y = -tableSize / 2 + slotGap * i;
        addTableSlot(group, tableSize, y, slotWidth, lipWidth, tableTopZ + slotDepth, grooveMaterial, lipMaterial);
      }

      addWorkholding(group, stock, tableTopZ, tableSize, clampMaterial, grooveMaterial, lipMaterial);
      addTableBoltPattern(group, tableSize, tableTopZ, stock.isLarge, grooveMaterial, lipMaterial);
      addTableScratches(group, tableSize, tableTopZ + .18);

      return group;
    }

    function addTableSlot(group, tableSize, y, slotWidth, lipWidth, z, grooveMaterial, lipMaterial) {
      const length = tableSize * .9;
      const slot = new THREE.Mesh(
        new THREE.BoxGeometry(length, slotWidth, .16),
        grooveMaterial
      );
      slot.position.set(0, y, z);
      slot.receiveShadow = true;
      group.add(slot);

      const throat = new THREE.Mesh(
        new THREE.BoxGeometry(length, slotWidth * .42, .22),
        grooveMaterial
      );
      throat.position.set(0, y, z + .06);
      throat.receiveShadow = true;
      group.add(throat);

      [-1, 1].forEach(sign => {
        const lip = new THREE.Mesh(
          new THREE.BoxGeometry(length, lipWidth, .1),
          lipMaterial
        );
        lip.position.set(0, y + sign * (slotWidth / 2 + lipWidth / 2), z + .08);
        lip.castShadow = true;
        lip.receiveShadow = true;
        group.add(lip);
      });
    }

    function addWorkholding(group, stock, tableTopZ, tableSize, clampMaterial, grooveMaterial, lipMaterial) {
      const isLarge = stock.isLarge;
      const clampLength = isLarge ? 30 : 9.5;
      const clampWidth = isLarge ? 8.4 : 2.8;
      const clampHeight = isLarge ? 1.2 : .48;
      const boltRadius = isLarge ? 1.55 : .42;
      const boltHeight = isLarge ? 1.25 : .42;
      const stockHalfX = stock.width / 2;
      const stockHalfY = stock.depth / 2;
      const overlap = isLarge ? 3.8 : 1.4;
      const clampYs = [-stock.depth * .28, stock.depth * .28];

      [-1, 1].forEach(sign => {
        clampYs.forEach(y => {
          const x = sign * (stockHalfX + clampLength / 2 - overlap);
          const strap = new THREE.Mesh(
            new THREE.BoxGeometry(clampLength, clampWidth, clampHeight),
            clampMaterial
          );
          strap.position.set(x, y, tableTopZ + clampHeight / 2 + .08);
          strap.rotation.y = sign * -.08;
          strap.castShadow = true;
          strap.receiveShadow = true;
          group.add(strap);

          const toe = new THREE.Mesh(
            new THREE.BoxGeometry(isLarge ? 4.8 : 1.5, clampWidth * .92, clampHeight * .74),
            lipMaterial
          );
          toe.position.set(sign * (stockHalfX + .65), y, tableTopZ + clampHeight * .42 + .1);
          toe.rotation.y = sign * -.08;
          toe.castShadow = true;
          toe.receiveShadow = true;
          group.add(toe);

          const support = new THREE.Mesh(
            new THREE.BoxGeometry(isLarge ? 7.5 : 2.2, clampWidth * 1.05, clampHeight * 1.6),
            grooveMaterial
          );
          support.position.set(sign * (stockHalfX + clampLength - overlap - (isLarge ? 3.5 : 1.2)), y, tableTopZ + clampHeight * .82);
          support.castShadow = true;
          support.receiveShadow = true;
          group.add(support);

          const bolt = createZCylinder(boltRadius, boltRadius * .94, boltHeight, 28, lipMaterial);
          bolt.position.set(sign * (stockHalfX + clampLength * .42), y, tableTopZ + clampHeight + boltHeight / 2 + .12);
          group.add(bolt);

          const washer = createToolRing(boltRadius * 1.35, boltRadius * .16, tableTopZ + clampHeight + .15, grooveMaterial);
          washer.position.x = sign * (stockHalfX + clampLength * .42);
          washer.position.y = y;
          group.add(washer);
        });
      });

      if (stock.type === 'square') {
        [-1, 1].forEach(sign => {
          const rail = new THREE.Mesh(
            new THREE.BoxGeometry(stock.width * .7, 3.2, .5),
            clampMaterial
          );
          rail.position.set(0, sign * (stockHalfY + 2.2), tableTopZ + .28);
          rail.castShadow = true;
          rail.receiveShadow = true;
          group.add(rail);
        });
      } else {
        const rest = createToolRing(stock.radius + 1.6, .18, tableTopZ + .22, lipMaterial);
        rest.scale.y = .76;
        group.add(rest);
      }
    }

    function addTableBoltPattern(group, tableSize, tableTopZ, isLarge, grooveMaterial, lipMaterial) {
      const radius = isLarge ? 2 : .58;
      const inset = isLarge ? 16 : 4.2;
      const positions = [
        [-tableSize / 2 + inset, -tableSize / 2 + inset],
        [tableSize / 2 - inset, -tableSize / 2 + inset],
        [-tableSize / 2 + inset, tableSize / 2 - inset],
        [tableSize / 2 - inset, tableSize / 2 - inset],
        [0, -tableSize / 2 + inset],
        [0, tableSize / 2 - inset]
      ];

      positions.forEach(([x, y]) => {
        const recess = createZCylinder(radius * 1.25, radius * 1.25, .12, 32, grooveMaterial);
        recess.position.set(x, y, tableTopZ + .16);
        group.add(recess);

        const highlight = createToolRing(radius * 1.28, radius * .08, tableTopZ + .23, lipMaterial);
        highlight.position.x = x;
        highlight.position.y = y;
        group.add(highlight);
      });
    }

    function addTableScratches(group, tableSize, z) {
      const points = [];
      const scratchCount = 18;
      for (let i = 0; i < scratchCount; i++) {
        const t = i / (scratchCount - 1);
        const y = -tableSize * .37 + tableSize * .74 * t;
        const x = -tableSize * .36 + ((i * 37) % 19) * tableSize * .018;
        const length = tableSize * (.18 + ((i * 11) % 9) * .015);
        points.push(
          new THREE.Vector3(x, y, z),
          new THREE.Vector3(Math.min(x + length, tableSize * .42), y + ((i % 3) - 1) * tableSize * .006, z)
        );
      }
      const scratches = new THREE.LineSegments(
        new THREE.BufferGeometry().setFromPoints(points),
        new THREE.LineBasicMaterial({ color: 0xa8b6bc, transparent: true, opacity: .18 })
      );
      scratches.renderOrder = 2;
      group.add(scratches);
    }

    function applyCameraForStock() {
      const stock = getStock();
      camera.position.set(...stock.camera);
      controls.target.set(...stock.target);
      controls.update();
      drawTopView(pathPoints, currentPos, running ? simIndex : pathPoints.length - 1);
    }

    function disposeObject(object) {
      object.traverse?.(child => {
        child.geometry?.dispose();
        if (Array.isArray(child.material)) {
          child.material.forEach(material => material.dispose());
        } else {
          child.material?.dispose();
        }
      });
      object.geometry?.dispose();
      if (Array.isArray(object.material)) {
        object.material.forEach(material => material.dispose());
      } else {
        object.material?.dispose();
      }
    }

    function getDemoCode() {
      return shouldUseLargeDemo(getStock()) ? createFlowerDemoCode() : crossDemoCode;
    }

    function shouldUseLargeDemo(stock) {
      return stock.type === 'square' && Math.min(stock.width, stock.depth) >= 120;
    }

    function createFlowerDemoCode() {
      const lines = [
        'O3003 (大材料花形加工实例)',
        'G21 G17 G90',
        'G00 X0 Y0 Z15',
        'M03 S800'
      ];

      const points = [];
      const count = 144;
      for (let i = 0; i <= count; i++) {
        const t = (Math.PI * 2 * i) / count;
        const radius = 42 + 28 * Math.cos(6 * t);
        points.push({
          x: Math.cos(t) * radius,
          y: Math.sin(t) * radius
        });
      }

      lines.push(`G00 X${points[0].x.toFixed(3)} Y${points[0].y.toFixed(3)} Z15`);
      lines.push('G01 Z-2 F100');
      points.slice(1).forEach(point => {
        lines.push(`G01 X${point.x.toFixed(3)} Y${point.y.toFixed(3)} F260`);
      });
      lines.push('G00 Z15');
      lines.push('G00 X0 Y0');
      lines.push('M05');
      lines.push('M30');
      return lines.join('\n');
    }

    function parseGCode(code) {
      const rows = code.split(/\r?\n/);
      const result = [];
      const events = [];
      let modal = { g: 0, x: 0, y: 0, z: INITIAL_Z, f: null, spindleOn: false, spindleSpeed: null };

      rows.forEach((raw, index) => {
        const cleaned = raw.replace(/\(.*?\)/g, '').replace(/;.*/, '').trim();
        if (!cleaned) return;

        const tokens = cleaned.match(/[A-Za-z]-?\d+(?:\.\d+)?/g) || [];
        const cmd = {
          line: index + 1,
          raw: raw.trim(),
          g: null,
          start: { x: modal.x, y: modal.y, z: modal.z },
          end: { x: modal.x, y: modal.y, z: modal.z },
          feed: modal.f,
          spindleOn: modal.spindleOn,
          spindleSpeed: modal.spindleSpeed,
          hasMove: false,
          rapid: false,
          arc: false,
          cw: false,
          i: 0,
          j: 0
        };
        let speedCommand = null;
        let spindleCommand = null;

        tokens.forEach(token => {
          const key = token[0].toUpperCase();
          const value = Number(token.slice(1));
          if (key === 'G') {
            if ([0, 1, 2, 3].includes(value)) {
              modal.g = value;
              cmd.g = value;
            }
          } else if (key === 'X') {
            cmd.end.x = value;
            modal.x = value;
            cmd.hasMove = true;
          } else if (key === 'Y') {
            cmd.end.y = value;
            modal.y = value;
            cmd.hasMove = true;
          } else if (key === 'Z') {
            cmd.end.z = value;
            modal.z = value;
            cmd.hasMove = true;
          } else if (key === 'F') {
            modal.f = value;
            cmd.feed = value;
          } else if (key === 'S') {
            modal.spindleSpeed = value;
            speedCommand = value;
          } else if (key === 'M') {
            spindleCommand = value;
            if (value === 3 || value === 4) modal.spindleOn = true;
            if (value === 5) modal.spindleOn = false;
          } else if (key === 'I') {
            cmd.i = value;
          } else if (key === 'J') {
            cmd.j = value;
          }
        });

        cmd.g = cmd.g ?? modal.g;
        cmd.rapid = cmd.g === 0;
        cmd.arc = cmd.g === 2 || cmd.g === 3;
        cmd.cw = cmd.g === 2;
        cmd.spindleOn = modal.spindleOn;
        cmd.spindleSpeed = modal.spindleSpeed;
        events.push({
          line: index + 1,
          raw: raw.trim(),
          speedCommand,
          spindleCommand,
          spindleOn: modal.spindleOn,
          spindleSpeed: modal.spindleSpeed,
          hasMove: cmd.hasMove
        });
        if (cmd.hasMove) result.push(cmd);
      });

      result.events = events;
      return result;
    }

    function buildPath(cmds) {
      const points = [{ x: 0, y: 0, z: INITIAL_Z, rapid: true, line: 0, raw: 'START' }];
      let length = 0;

      cmds.forEach(cmd => {
        const samples = sampleCommand(cmd);
        samples.forEach(point => {
          const last = points[points.length - 1];
          length += distance(last, point);
          points.push({ ...point, rapid: cmd.rapid, line: cmd.line, raw: cmd.raw, g: cmd.g, spindleOn: cmd.spindleOn, spindleSpeed: cmd.spindleSpeed });
        });
      });

      return { points, length };
    }

    function sampleCommand(cmd) {
      if (!cmd.arc) {
        const dist = distance(cmd.start, cmd.end);
        const steps = Math.max(1, Math.ceil(dist / STEP_MM));
        return Array.from({ length: steps }, (_, index) => {
          const t = (index + 1) / steps;
          return lerpPoint(cmd.start, cmd.end, t);
        });
      }

      const center = { x: cmd.start.x + cmd.i, y: cmd.start.y + cmd.j, z: cmd.start.z };
      const radius = Math.hypot(cmd.start.x - center.x, cmd.start.y - center.y);
      if (radius < 0.001) return [cmd.end];
      let a0 = Math.atan2(cmd.start.y - center.y, cmd.start.x - center.x);
      let a1 = Math.atan2(cmd.end.y - center.y, cmd.end.x - center.x);
      const fullCircle = Math.hypot(cmd.end.x - cmd.start.x, cmd.end.y - cmd.start.y) < 0.001;
      if (fullCircle) {
        a1 = a0 + (cmd.cw ? -Math.PI * 2 : Math.PI * 2);
      } else {
        if (cmd.cw && a1 > a0) a1 -= Math.PI * 2;
        if (!cmd.cw && a1 < a0) a1 += Math.PI * 2;
      }
      const arcLen = Math.abs(a1 - a0) * radius;
      const steps = Math.max(8, Math.ceil(arcLen / STEP_MM));
      return Array.from({ length: steps }, (_, index) => {
        const t = (index + 1) / steps;
        const a = a0 + (a1 - a0) * t;
        return {
          x: center.x + Math.cos(a) * radius,
          y: center.y + Math.sin(a) * radius,
          z: cmd.start.z + (cmd.end.z - cmd.start.z) * t
        };
      });
    }

    function detectAlarms(points, cmds = []) {
      const result = [];
      const seen = new Set();
      const stock = getStock();
      const events = cmds.events || [];

      events.forEach(event => {
        if (event.speedCommand !== null && event.speedCommand > MAX_SPINDLE_SPEED && !seen.has(`${event.line}-speed`)) {
          seen.add(`${event.line}-speed`);
          result.push({
            type: 'warn',
            line: event.line,
            message: `主轴转速 S${event.speedCommand} 超过上限 S${MAX_SPINDLE_SPEED}，请降低转速后再加工。`
          });
        }
      });

      points.forEach((p, index) => {
        if (index === 0) return;
        const prev = points[index - 1];
        const inStockArea = isInsideStockArea(p, TOOL_RADIUS);
        const xyMove = Math.hypot(p.x - prev.x, p.y - prev.y) > 0.01;
        const rapidDown = p.z < prev.z - 0.01;
        const insideMaterial = p.z < -0.05;
        const key = `${p.line}-`;

        if (p.rapid && insideMaterial && inStockArea && rapidDown && !seen.has(key + 'rapid-down')) {
          seen.add(key + 'rapid-down');
          result.push({ type: 'crash', line: p.line, point: p, message: `G00 快速下刀进入材料，当前 Z${p.z.toFixed(2)}，存在撞刀风险。` });
        }
        if (p.rapid && insideMaterial && inStockArea && xyMove && !seen.has(key + 'rapid-xy')) {
          seen.add(key + 'rapid-xy');
          result.push({ type: 'crash', line: p.line, point: p, message: `G00 未抬刀就在材料内快速横移，当前 Z${p.z.toFixed(2)}，存在撞刀风险。` });
        }
        if (p.z < -stock.height && !seen.has(key + 'bottom')) {
          seen.add(key + 'bottom');
          result.push({ type: 'crash', line: p.line, point: p, message: `Z${p.z.toFixed(2)} 已低于工件底面 -${stock.height.toFixed(1)}mm，可能穿透工件或撞到工作台。` });
        } else if (!p.rapid && p.z < -CUT_DEPTH_CRASH && !seen.has(key + 'deep-crash')) {
          seen.add(key + 'deep-crash');
          result.push({ type: 'crash', line: p.line, point: p, message: `切削深度 ${Math.abs(p.z).toFixed(2)}mm 超过 ${CUT_DEPTH_CRASH.toFixed(1)}mm，切深过大。` });
        } else if (!p.rapid && p.z < -CUT_DEPTH_WARN && !seen.has(key + 'deep-warn')) {
          seen.add(key + 'deep-warn');
          result.push({ type: 'warn', line: p.line, point: p, message: `切削深度 ${Math.abs(p.z).toFixed(2)}mm 超过 ${CUT_DEPTH_WARN.toFixed(1)}mm，切深偏大，请确认工艺参数。` });
        }
        if (!p.rapid && p.z < 0 && !p.spindleOn && !seen.has(key + 'spindle-off')) {
          seen.add(key + 'spindle-off');
          result.push({ type: 'crash', line: p.line, point: p, message: '主轴未启动就开始切削，请先执行 M03/M04。' });
        }
        if (!p.rapid && p.z <= 0 && !inStockArea && !seen.has(key + 'outside')) {
          seen.add(key + 'outside');
          result.push({ type: 'warn', line: p.line, point: p, message: `切削点超出 ${stock.areaLabel} 范围。` });
        }
      });

      const lastPoint = points[points.length - 1];
      if (lastPoint && lastPoint.z < -0.05) {
        result.push({
          type: 'warn',
          line: lastPoint.line,
          point: lastPoint,
          message: `程序结束时刀具仍在材料内，当前 Z${lastPoint.z.toFixed(2)}，建议结束前抬刀到安全高度。`
        });
      }
      return result;
    }

    function isInsideStockArea(point, margin = 0) {
      const stock = getStock();
      if (stock.type === 'round') {
        return Math.hypot(point.x, point.y) <= stock.radius + margin;
      }
      return Math.abs(point.x) <= stock.width / 2 + margin && Math.abs(point.y) <= stock.depth / 2 + margin;
    }

    function analyzeProgram() {
      const code = elements.gcode.value.trim();
      if (!code) {
        writeLog([{ type: 'warn', line: 0, message: '请先输入或加载 G 代码。' }]);
        return false;
      }

      commands = parseGCode(code);
      const built = buildPath(commands);
      pathPoints = built.points;
      totalLength = built.length;
      alarms = detectAlarms(pathPoints, commands);

      clearGroup(pathGroup);
      clearGroup(surfaceCutGroup);
      clearGroup(crashGroup);
      drawFullPath(pathPoints);
      drawSurfaceCuts(pathPoints);
      drawCrashes(alarms);
      drawBounds(pathPoints);
      drawTopView(pathPoints, pathPoints[0], pathPoints.length - 1);
      writeLog(alarms.length ? alarms : [{ type: 'ok', line: 0, message: '检测完成：未发现明显撞刀风险。' }]);
      updateMetrics(pathPoints[0], 0, 0);
      elements.length.textContent = `${totalLength.toFixed(1)} mm`;
      elements.alarmCount.textContent = String(alarms.length);
      elements.crashState.textContent = alarms.some(a => a.type === 'crash') ? '有风险' : '正常';
      elements.crashState.style.color = alarms.some(a => a.type === 'crash') ? 'var(--red)' : 'var(--green)';
      return true;
    }

    function drawFullPath(points) {
      for (let i = 1; i < points.length; i++) {
        addPathSegment(points[i - 1], points[i]);
      }
    }

    function drawSurfaceCuts(points) {
      buildCutSegments(points).forEach(segment => {
        addSurfaceCut(segment.start, segment.end, segment);
      });
    }

    function buildCutSegments(points) {
      const segments = [];
      let current = null;

      for (let i = 1; i < points.length; i++) {
        const a = points[i - 1];
        const b = points[i];
        if (b.rapid || Math.min(a.z, b.z) > 0) {
          current = null;
          continue;
        }

        const xyDistance = Math.hypot(b.x - a.x, b.y - a.y);
        if (xyDistance < 0.03) {
          current = null;
          continue;
        }

        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        const depth = getVisualCutDepth(a, b);
        const continuesCurrent = current
          && current.line === b.line
          && Math.hypot(a.x - current.end.x, a.y - current.end.y) < 0.08
          && Math.abs(a.z - current.end.z) < 0.08
          && Math.abs(depth - current.depth) < 0.18
          && angleDelta(angle, current.angle) < 0.035;

        if (continuesCurrent) {
          current.end = b;
          current.depth = Math.max(current.depth, depth);
        } else {
          current = { start: a, end: b, line: b.line, angle, depth, startCap: true, endCap: true };
          segments.push(current);
        }
      }

      return segments;
    }

    function angleDelta(a, b) {
      return Math.abs(Math.atan2(Math.sin(a - b), Math.cos(a - b)));
    }

    function drawTopView(points = [], activePoint = currentPos, uptoIndex = points.length - 1) {
      const canvas = elements.topView;
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.max(1, Math.round(rect.width * dpr));
      const height = Math.max(1, Math.round(rect.height * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      const ctx = canvas.getContext('2d');
      const cx = width / 2;
      const cy = height / 2;
      const stock = getStock();
      const maxSide = Math.max(stock.width, stock.depth);
      const viewSize = Math.max(42, maxSide * 1.18);
      const gridStep = maxSide >= 120 ? 25 : 5;
      const scale = Math.min(width, height) / viewSize;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#0d1012';
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = 'rgba(61, 214, 208, .12)';
      ctx.lineWidth = 1;
      const gridLimit = Math.ceil(viewSize / 2 / gridStep) * gridStep;
      for (let i = -gridLimit; i <= gridLimit; i += gridStep) {
        ctx.beginPath();
        ctx.moveTo(cx + i * scale, 0);
        ctx.lineTo(cx + i * scale, height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, cy - i * scale);
        ctx.lineTo(width, cy - i * scale);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(61, 214, 208, .55)';
      ctx.beginPath();
      ctx.moveTo(cx, 0);
      ctx.lineTo(cx, height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, cy);
      ctx.lineTo(width, cy);
      ctx.stroke();

      ctx.fillStyle = 'rgba(112, 123, 130, .22)';
      ctx.strokeStyle = 'rgba(220, 231, 234, .55)';
      ctx.lineWidth = 2;
      if (stock.type === 'round') {
        ctx.beginPath();
        ctx.arc(cx, cy, stock.radius * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      } else {
        const w = stock.width * scale;
        const h = stock.depth * scale;
        ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
        ctx.strokeRect(cx - w / 2, cy - h / 2, w, h);
      }

      const lastIndex = Math.max(0, Math.min(uptoIndex, points.length - 1));
      for (let i = 1; i <= lastIndex; i++) {
        const a = points[i - 1];
        const b = points[i];
        ctx.strokeStyle = b.rapid ? 'rgba(240,177,59,.85)' : 'rgba(35,194,119,.88)';
        ctx.lineWidth = b.rapid ? 1.4 : Math.max(2, TOOL_RADIUS * 2 * scale);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.setLineDash(b.rapid ? [5, 4] : []);
        ctx.beginPath();
        ctx.moveTo(cx + a.x * scale, cy - a.y * scale);
        ctx.lineTo(cx + b.x * scale, cy - b.y * scale);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      alarms.forEach(alarm => {
        if (alarm.type !== 'crash') return;
        const p = alarm.point;
        ctx.fillStyle = '#f05a5a';
        ctx.beginPath();
        ctx.arc(cx + p.x * scale, cy - p.y * scale, 4 * dpr, 0, Math.PI * 2);
        ctx.fill();
      });

      if (activePoint) {
        ctx.strokeStyle = '#3dd6d0';
        ctx.fillStyle = '#3dd6d0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx + activePoint.x * scale, cy - activePoint.y * scale, TOOL_RADIUS * scale, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx + activePoint.x * scale, cy - activePoint.y * scale, 2.5 * dpr, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = 'rgba(238,243,246,.72)';
      ctx.font = `${10 * dpr}px Consolas, monospace`;
      ctx.fillText('X', width - 18 * dpr, cy - 5 * dpr);
      ctx.fillText('Y', cx + 6 * dpr, 17 * dpr);
      const stockText = stock.type === 'round'
        ? `Ø${formatStockNumber(stock.width)}`
        : `${formatStockNumber(stock.width)}x${formatStockNumber(stock.depth)}`;
      const labelY = stock.type === 'round' ? cy - stock.radius * scale - 7 * dpr : cy - stock.depth * scale / 2 - 7 * dpr;
      ctx.fillText(stockText, cx - 20 * dpr, labelY);
    }

    function addPathSegment(a, b) {
      const xyDistance = Math.hypot(b.x - a.x, b.y - a.y);
      const isCuttingOnStock = !b.rapid && Math.min(a.z, b.z) <= 0;
      const color = b.rapid ? 0xf0b13b : 0x1593ff;
      const opacity = b.rapid ? .64 : isCuttingOnStock ? .9 : .54;
      const dashed = b.rapid && xyDistance > 0.03;
      addLine(a, b, color, opacity, dashed);
    }

    function addLine(a, b, color, opacity = .32, dashed = false) {
      const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(a.x, a.y, a.z),
        new THREE.Vector3(b.x, b.y, b.z)
      ]);
      const material = dashed
        ? new THREE.LineDashedMaterial({ color, transparent: true, opacity, dashSize: 2.4, gapSize: 1.4, depthWrite: false })
        : new THREE.LineBasicMaterial({ color, transparent: true, opacity, depthWrite: false });
      const line = new THREE.Line(geometry, material);
      if (dashed) line.computeLineDistances();
      pathGroup.add(line);
    }

    function addSurfaceCut(a, b, options = {}) {
      if (b.rapid || Math.min(a.z, b.z) > 0) return;

      const xyDistance = Math.hypot(b.x - a.x, b.y - a.y);
      const angle = Math.atan2(b.y - a.y, b.x - a.x);
      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2;
      const cutDepth = options.depth ?? getVisualCutDepth(a, b);
      const cutWidth = TOOL_RADIUS * 2.08;
      const cutMaterials = createCutMaterials(cutDepth);

      if (xyDistance < 0.03) {
        return;
      }

      addCutStrip(midX, midY, xyDistance, cutWidth, angle, cutDepth, cutMaterials);
    }

    function getVisualCutDepth(a, b) {
      const stock = getStock();
      const programmedDepth = Math.abs(Math.min(0, a.z, b.z));
      return Math.min(stock.height - .25, Math.max(.35, programmedDepth));
    }

    function createCutMaterials(depth) {
      const depthRatio = Math.min(1, depth / Math.max(TOOL_RADIUS * 1.4, .1));
      return {
        bottom: new THREE.MeshBasicMaterial({
          color: 0x1593ff,
          transparent: true,
          opacity: .76,
          depthTest: false,
          depthWrite: false
        }),
        wall: new THREE.MeshBasicMaterial({
          color: depthRatio > .55 ? 0x07345f : 0x0b63a9,
          transparent: true,
          opacity: .2 + depthRatio * .1,
          depthTest: false,
          depthWrite: false
        }),
        highlight: new THREE.MeshBasicMaterial({
          color: 0x83e7ff,
          transparent: true,
          opacity: .48,
          depthTest: false,
          depthWrite: false
        }),
        freshMetal: new THREE.MeshBasicMaterial({
          color: 0x49d8ff,
          transparent: true,
          opacity: .2,
          depthTest: false,
          depthWrite: false
        }),
        toolMark: new THREE.LineBasicMaterial({
          color: 0xbdf6ff,
          transparent: true,
          opacity: .28,
          depthTest: false
        })
      };
    }

    function addCutStrip(x, y, length, width, angle, depth, materials) {
      const topZ = 0.075;
      const shadow = new THREE.Mesh(
        createRoundedSlotGeometry(length + width * .18, width * 1.06),
        materials.wall
      );
      shadow.position.set(x, y, topZ - .006);
      shadow.rotation.z = angle;
      shadow.renderOrder = 3;
      surfaceCutGroup.add(shadow);

      const bottom = new THREE.Mesh(
        createRoundedSlotGeometry(length, width * .78),
        materials.bottom
      );
      bottom.position.set(x, y, topZ);
      bottom.rotation.z = angle;
      bottom.renderOrder = 4;
      surfaceCutGroup.add(bottom);

      const sheen = new THREE.Mesh(
        createRoundedSlotGeometry(Math.max(width * .9, length * .9), width * .38),
        materials.freshMetal
      );
      sheen.position.set(x, y, topZ + .012);
      sheen.rotation.z = angle;
      sheen.renderOrder = 5;
      surfaceCutGroup.add(sheen);

      [-1, 1].forEach(sign => {
        const lip = new THREE.Mesh(
          new THREE.PlaneGeometry(Math.max(.01, length - width * .72), Math.max(.035, width * .022)),
          materials.highlight
        );
        lip.position.set(
          x + Math.cos(angle + Math.PI / 2) * sign * width * .39,
          y + Math.sin(angle + Math.PI / 2) * sign * width * .39,
          topZ + .03
        );
        lip.rotation.z = angle;
        lip.renderOrder = 6;
        surfaceCutGroup.add(lip);
      });

      if (length > TOOL_RADIUS * 3) {
        addCutToolMarks(x, y, length, width, angle, topZ + .04, materials.toolMark);
      }
    }

    function createRoundedSlotGeometry(length, width) {
      const shape = new THREE.Shape();
      const radius = width / 2;
      const halfLength = Math.max(length / 2, radius);
      const straight = Math.max(0, halfLength - radius);
      shape.moveTo(-straight, -radius);
      shape.lineTo(straight, -radius);
      shape.absarc(straight, 0, radius, -Math.PI / 2, Math.PI / 2, false);
      shape.lineTo(-straight, radius);
      shape.absarc(-straight, 0, radius, Math.PI / 2, Math.PI * 1.5, false);
      return new THREE.ShapeGeometry(shape, 24);
    }

    function addCutDisc(x, y, radius, depth, materials, showRim = false) {
      const topZ = 0.082;
      const wall = new THREE.Mesh(
        new THREE.CylinderGeometry(radius * .96, radius * .96, depth, 56, 1, true),
        materials.wall
      );
      wall.rotation.x = Math.PI / 2;
      wall.position.set(x, y, -depth / 2 + .04);
      wall.renderOrder = 3;
      surfaceCutGroup.add(wall);

      const bottom = new THREE.Mesh(
        new THREE.CircleGeometry(radius * .86, 56),
        materials.bottom
      );
      bottom.position.set(x, y, topZ);
      bottom.renderOrder = 4;
      surfaceCutGroup.add(bottom);

      if (showRim) {
        const sheen = new THREE.Mesh(
          new THREE.CircleGeometry(radius * .52, 36),
          materials.freshMetal
        );
        sheen.position.set(x, y, topZ + .014);
        sheen.renderOrder = 5;
        surfaceCutGroup.add(sheen);

        const rim = new THREE.Mesh(
          new THREE.TorusGeometry(radius * .96, Math.max(.035, radius * .035), 8, 64),
          materials.highlight
        );
        rim.position.set(x, y, topZ + .035);
        rim.renderOrder = 6;
        surfaceCutGroup.add(rim);
      }
    }

    function addCutToolMarks(x, y, length, width, angle, z, material) {
      const points = [];
      const markCount = Math.max(2, Math.min(8, Math.floor(length / (TOOL_RADIUS * 2.2))));
      const normalAngle = angle + Math.PI / 2;
      for (let i = 1; i <= markCount; i++) {
        const t = i / (markCount + 1) - .5;
        const centerX = x + Math.cos(angle) * length * t;
        const centerY = y + Math.sin(angle) * length * t;
        const half = width * .28;
        points.push(
          new THREE.Vector3(centerX - Math.cos(normalAngle) * half, centerY - Math.sin(normalAngle) * half, z),
          new THREE.Vector3(centerX + Math.cos(normalAngle) * half, centerY + Math.sin(normalAngle) * half, z)
        );
      }
      if (!points.length) return;
      const marks = new THREE.LineSegments(
        new THREE.BufferGeometry().setFromPoints(points),
        material
      );
      marks.renderOrder = 7;
      surfaceCutGroup.add(marks);
    }

    function drawCrashes(items) {
      items.forEach(item => {
        if (item.type !== 'crash') return;
        const mark = new THREE.Mesh(
          new THREE.SphereGeometry(1.1, 18, 18),
          new THREE.MeshBasicMaterial({ color: 0xf05a5a })
        );
        mark.position.set(item.point.x, item.point.y, item.point.z);
        crashGroup.add(mark);
      });
    }

    function drawBounds(points) {
      if (boundsHelper) {
        scene.remove(boundsHelper);
        boundsHelper.geometry.dispose();
        boundsHelper.material.dispose();
      }
      if (points.length < 2) return;

      const box = new THREE.Box3();
      points.forEach(p => box.expandByPoint(new THREE.Vector3(p.x, p.y, p.z)));
      box.expandByScalar(TOOL_RADIUS);

      const size = new THREE.Vector3();
      box.getSize(size);
      elements.boundsLabel.textContent = `${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)} mm`;
      elements.xRange.textContent = `${box.min.x.toFixed(1)} ~ ${box.max.x.toFixed(1)}`;
      elements.yRange.textContent = `${box.min.y.toFixed(1)} ~ ${box.max.y.toFixed(1)}`;
      elements.zRange.textContent = `${box.min.z.toFixed(1)} ~ ${box.max.z.toFixed(1)}`;
    }

    function runSimulation() {
      if (running) return;
      if (!analyzeProgram()) return;
      running = true;
      simIndex = 1;
      segmentT = 0;
      currentPos = { ...pathPoints[0] };
      elements.status.textContent = '仿真运行中';
      elements.lamp.style.background = 'var(--amber)';
      elements.lamp.style.boxShadow = '0 0 12px var(--amber)';
      clearGroup(pathGroup);
      clearGroup(surfaceCutGroup);
      drawTopView(pathPoints, currentPos, 0);
      animationId = requestAnimationFrame(stepSimulation);
    }

    function stepSimulation() {
      if (!running) return;
      if (simIndex >= pathPoints.length) {
        finishSimulation();
        return;
      }

      const start = simIndex === 1 ? pathPoints[0] : pathPoints[simIndex - 1];
      const end = pathPoints[simIndex];
      segmentT += SPEED * getSimulationSpeedMultiplier();
      currentPos = lerpPoint(start, end, Math.min(segmentT, 1));
      moveTool(currentPos);
      updateMetrics(currentPos, simIndex, (simIndex / Math.max(pathPoints.length - 1, 1)) * 100);
      drawTopView(pathPoints, currentPos, simIndex - 1);

      if (segmentT >= 1) {
        addPathSegment(start, end);
        clearGroup(surfaceCutGroup);
        drawSurfaceCuts(pathPoints.slice(0, simIndex + 1));
        segmentT = 0;
        simIndex++;
        drawTopView(pathPoints, end, simIndex - 1);
      }
      animationId = requestAnimationFrame(stepSimulation);
    }

    function finishSimulation() {
      running = false;
      elements.status.textContent = alarms.some(a => a.type === 'crash') ? '完成：有撞刀风险' : '仿真完成';
      elements.lamp.style.background = alarms.some(a => a.type === 'crash') ? 'var(--red)' : 'var(--green)';
      elements.lamp.style.boxShadow = alarms.some(a => a.type === 'crash') ? '0 0 12px var(--red)' : '0 0 12px var(--green)';
      elements.progress.style.width = '100%';
      drawCrashes(alarms);
      drawTopView(pathPoints, pathPoints[pathPoints.length - 1], pathPoints.length - 1);
    }

    function resetSimulation(clearCode) {
      running = false;
      if (animationId) cancelAnimationFrame(animationId);
      commands = [];
      pathPoints = [];
      alarms = [];
      totalLength = 0;
      currentPos = { x: 0, y: 0, z: INITIAL_Z };
      if (clearCode) elements.gcode.value = '';
      clearGroup(pathGroup);
      clearGroup(surfaceCutGroup);
      clearGroup(crashGroup);
      if (boundsHelper) {
        scene.remove(boundsHelper);
        boundsHelper.geometry.dispose();
        boundsHelper.material.dispose();
        boundsHelper = null;
      }
      moveTool(currentPos);
      elements.status.textContent = '就绪';
      elements.lamp.style.background = 'var(--green)';
      elements.lamp.style.boxShadow = '0 0 12px var(--green)';
      elements.pos.textContent = `X0.000 Y0.000 Z${INITIAL_Z.toFixed(3)}`;
      elements.cmd.textContent = '--';
      elements.length.textContent = '0.0 mm';
      elements.crashState.textContent = '正常';
      elements.crashState.style.color = 'var(--green)';
      elements.progress.style.width = '0%';
      elements.lineInfo.textContent = '第 0 行';
      elements.xRange.textContent = '--';
      elements.yRange.textContent = '--';
      elements.zRange.textContent = '--';
      elements.boundsLabel.textContent = '未生成';
      elements.alarmCount.textContent = '0';
      drawTopView([], currentPos, 0);
      writeLog([{ type: 'ok', line: 0, message: '已就绪：加载实例或输入 G 代码后开始仿真。' }]);
    }

    function updateMetrics(p, index, progress) {
      if (!p) return;
      elements.pos.textContent = `X${p.x.toFixed(3)} Y${p.y.toFixed(3)} Z${p.z.toFixed(3)}`;
      elements.cmd.textContent = p.raw || '--';
      elements.lineInfo.textContent = `第 ${p.line || 0} 行`;
      elements.progress.style.width = `${Math.max(0, Math.min(100, progress))}%`;
      const activeAlarm = alarms.find(a => a.line === p.line && a.type === 'crash');
      if (activeAlarm) {
        elements.crashState.textContent = '撞刀风险';
        elements.crashState.style.color = 'var(--red)';
      }
      moveTool(p);
    }

    function writeLog(items) {
      elements.log.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = `log-item ${item.type === 'crash' ? 'crash' : item.type === 'warn' ? 'warn' : ''}`;
        div.textContent = item.line ? `第${item.line}行：${item.message}` : item.message;
        elements.log.appendChild(div);
      });
    }

    function moveTool(p) {
      toolGroup.position.set(p.x, p.y, p.z);
    }

    function getSimulationSpeedMultiplier() {
      return getStock().isLarge ? LARGE_STOCK_SPEED_MULTIPLIER : 1;
    }

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();
        disposeObject(child);
      }
    }

    function lerpPoint(a, b, t) {
      return {
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t,
        z: a.z + (b.z - a.z) * t
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
    }
  </script>
